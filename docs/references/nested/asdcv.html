<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cyberpunk Interface</title>
    <style>
        body {
            margin: 0;
            background: black;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        h1 {
            font-size: 3em;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: 1px solid #00ffff;
            background: transparent;
            color: #00ffff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ffff;
            color: black;
            box-shadow: 0 0 20px #00ffff;
        }

        #log {
            margin-top: 20px;
            font-size: 14px;
            color: #0f0;
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>

    <div class="ui">
        <h1>CYBER CORE</h1>
        <button onclick="hack()">Initialize System</button>
        <div id="log"></div>
    </div>

    <script>
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                dx: (Math.random() - 0.5) * 2,
                dy: (Math.random() - 0.5) * 2
            });
        }

        function animate() {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#00ffff";

            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;

                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = "#00ffff";
                ctx.fill();

                particles.forEach(p2 => {
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = "rgba(0,255,255,0.1)";
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        animate();

        function hack() {
            const logs = [
                ">>> Booting system...",
                ">>> Accessing neural grid...",
                ">>> Bypassing firewall...",
                ">>> Injecting code...",
                ">>> ACCESS GRANTED ✔"
            ];

            let i = 0;
            const logBox = document.getElementById("log");
            logBox.innerHTML = "";

            let interval = setInterval(() => {
                if (i < logs.length) {
                    logBox.innerHTML += logs[i] + "<br>";
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 700);
        }
    </script>

</body>

</html>
