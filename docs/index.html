        1. Create a folder: docs/<category>/

        3. Add a link entry below:

        <li>
          <a href="<category>/">
            <span class="doc-icon">📁</span>
            <div>
              <div class="doc-title">Category Name</div>
              <div class="doc-desc">Brief description of the category.</div>
            </div>
            <span class="doc-count">N docs</span>
          </a>
        </li>
      -->
